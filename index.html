<html>
<head>
    
    <meta http-equiv="content-type" content="text/html; charset=UTF-8" />

    <style>
        #painel { 
            position: fixed; top: 10px; left: 10px; z-index: 10000; 
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            padding: 15px; border-radius: 20px; font-family: sans-serif; 
            width: 270px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); border: 2px solid #1b5e20;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #painel.minimizado { transform: translateX(-285px); }
        #btn-toggle { 
            position: absolute; right: -50px; top: 10px; background: #1b5e20; color: white;
            border: none; width: 45px; height: 45px; cursor: pointer; border-radius: 12px; font-size: 20px;
        }
        .btn-tech { width: 100%; padding: 12px; margin-top: 8px; border: none; border-radius: 10px; background: #1b5e20; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        /* GPS ULTRA DESTACADO */
        .user-loc-container {
            display: flex; align-items: center; justify-content: center;
        }
        .user-loc-dot {
            width: 18px; height: 18px; background: #007bff; border: 3px solid white;
            border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5); z-index: 2;
        }
        .user-loc-pulse {
            position: absolute; width: 40px; height: 40px; background: rgba(0, 123, 255, 0.4);
            border-radius: 50%; animation: pulse-gps 2s infinite; z-index: 1;
        }
        @keyframes pulse-gps {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        
        .rotulo-hd { color: black !important; font-weight: 900 !important; font-size: 15px !important; text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff; pointer-events: none; }
        #legenda-tiros { background: #f9f9f9; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 11px; }
        .cor-box { width: 12px; height: 12px; display: inline-block; margin-right: 5px; border: 1px solid #000; }
        .popup-table { font-size: 12px; border-collapse: collapse; width: 100%; }
        .popup-table td { padding: 4px; border-bottom: 1px solid #eee; }
    </style>

                initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

                    position: relative;

<body>
    
    
    <div id="painel">
        <button id="btn-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
        <div style="text-align:center;"><b style="color:#1b5e20; font-size:16px;">COLHEITA CLEALCO</b></div>
        <hr style="margin: 10px 0;">
        <input list="lista_fazendas" id="input_fazenda" oninput="atualizarMapa()" placeholder="🔍 Localizar Fazenda...">
        <datalist id="lista_fazendas"><option value="100453"><option value="107383"><option value="202948"></datalist>
        <button class="btn-tech" onclick="minhaPosicao()" style="background:#007bff"><i class="fas fa-location-crosshairs"></i> MINHA POSIÇÃO</button>
        <button class="btn-tech" style="background:#444" onclick="irParaRota()"><i class="fas fa-route"></i> ROTA GOOGLE</button>
        <div style="font-size: 11px; margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
            <label><input type="radio" name="tema" onclick="mudarTema(1)" checked> Tiros</label>
            <label><input type="radio" name="tema" onclick="mudarTema(2)"> Talhões</label>
        </div>
        <div id="legenda-tiros">
            <b>Legenda Tiros:</b><br>
            <span class="cor-box" style="background:#ff0000"></span> 0-150m (Curto)<br>
            <span class="cor-box" style="background:#ffff00"></span> 151-300m (Médio)<br>
            <span class="cor-box" style="background:#00ff00"></span> 301-450m (Longo)<br>
            <span class="cor-box" style="background:#00fffa"></span> >450m (Extra)
        </div>
        <button class="btn-tech" style="background:#eee; color:#333; height:30px; font-size:10px; margin-top:15px;" onclick="location.reload(true)">🔄 SYNC / RESET</button>
        <div style="text-align:center; font-size:9px; color:#666; margin-top:8px; font-style:italic;">📅 Atualizado em: 24/04/2026 09:52</div>
    </div>
    
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
    
    var mapObj, userMarker, farmCenter = null, tilesCarregados = new Set(), filtroFazenda = "", temaAtivo = 1, camadaDivisas = null, camadasLinhas = [], marcadoresLabels = [];

    function toggleMenu() { 
        document.getElementById('painel').classList.toggle('minimizado');
        const icon = document.querySelector('#btn-toggle i');
        icon.classList.toggle('fa-bars');
        icon.classList.toggle('fa-chevron-right');
    }

    $(document).ready(function() {
        setTimeout(function() {
            mapObj = window[document.querySelector('.folium-map').id];
            mapObj.createPane('pane_gps').style.zIndex = 1000;
            mapObj.createPane('pane_divisas').style.zIndex = 600;
            mapObj.createPane('pane_labels').style.zIndex = 800;
            
            $.getJSON("labels.json", data => data.forEach(l => {
                marcadoresLabels.push(L.marker([l.lat, l.lng], { 
                    icon: L.divIcon({ className: 'rotulo-hd', html: l.talhao }), 
                    alt: l.fazenda.toString().toUpperCase(),
                    pane: 'pane_labels'
                }));
            }));
            $.getJSON("manifesto.json", data => {
                mapObj.on('moveend', () => scanTiles(data));
                scanTiles(data);
            });
        }, 800);
    });

    function atualizarMapa() {
        var val = document.getElementById('input_fazenda').value.trim().toUpperCase();
        if (!val || val === filtroFazenda) return;
        filtroFazenda = val;
        if (camadaDivisas) mapObj.removeLayer(camadaDivisas);
        $.getJSON("divisas_split/divisas_" + filtroFazenda.replace(/ /g, "_") + ".json", data => {
            camadaDivisas = L.geoJson(data, { 
                pane: 'pane_divisas', style: { color: "black", weight: 3, fillOpacity: 0.1 },
                onEachFeature: (f,l) => {
                    let h = "<b>DETALHES DO TALHÃO</b><hr><table class='popup-table'>";
                    for (var key in f.properties) { h += "<tr><td><b>" + key + ":</b></td><td>" + f.properties[key] + "</td></tr>"; }
                    h += "</table>";
                    l.bindPopup(h);
                }
            }).addTo(mapObj);
            farmCenter = camadaDivisas.getBounds().getCenter();
            mapObj.fitBounds(camadaDivisas.getBounds());
        });
        refreshVisual();
    }

    function refreshVisual() {
        let s = (filtroFazenda !== "");
        camadasLinhas.forEach(c => c.eachLayer(l => {
            let p = l.feature.properties;
            let m = s && p['FAZENDA'].toString().trim().toUpperCase() === filtroFazenda;
            l.setStyle({ opacity: m ? 0.8 : 0, weight: m ? 1 : 0, color: (temaAtivo == 1 ? getCorTiro(p['CLASSE']) : p.color_talhao), interactive: m });
        }));
        marcadoresLabels.forEach(m => { 
            if(s && temaAtivo == 2 && m.options.alt === filtroFazenda) m.addTo(mapObj); 
            else mapObj.removeLayer(m); 
        });
        document.getElementById('legenda-tiros').style.display = (temaAtivo == 1) ? 'block' : 'none';
    }

    function getCorTiro(v) { return v <= 150 ? '#ff0000' : v <= 300 ? '#ffff00' : v <= 450 ? '#00ff00' : '#00fffa'; }

    function scanTiles(manifesto) {
        if (!filtroFazenda) return;
        let vB = mapObj.getBounds();
        manifesto.forEach(t => {
            if (vB.intersects(L.latLngBounds(t.bounds)) && !tilesCarregados.has(t.arquivo)) {
                tilesCarregados.add(t.arquivo);
                $.getJSON("tiles/" + t.arquivo, geo => {
                    camadasLinhas.push(L.geoJson(geo, { onEachFeature: (f,l) => l.bindPopup("Comp: "+f.properties.COMP_M.toFixed(1)+"m") }).addTo(mapObj));
                    refreshVisual();
                });
            }
        });
    }

    function minhaPosicao() {
        mapObj.locate({setView: true, maxZoom: 18, enableHighAccuracy: true});
        mapObj.on('locationfound', e => {
            if (userMarker) mapObj.removeLayer(userMarker);
            // CRIANDO O MARCADOR COM PULSO DUPLO
            var iconHtml = '<div class="user-loc-container"><div class="user-loc-pulse"></div><div class="user-loc-dot"></div></div>';
            userMarker = L.marker(e.latlng, { 
                icon: L.divIcon({ className: '', html: iconHtml, iconSize: [40, 40], iconAnchor: [20, 20] }), 
                pane: 'pane_gps' 
            }).addTo(mapObj);
        });
    }

    function irParaRota() {
        if (!farmCenter) return alert("Filtre uma fazenda!");
        window.open("https://www.google.com/maps/dir/?api=1&destination=" + farmCenter.lat + "," + farmCenter.lng);
    }

    function mudarTema(t) { temaAtivo = t; refreshVisual(); }
    
    </script>

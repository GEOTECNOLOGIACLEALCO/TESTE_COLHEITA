    <style>
        #painel { position: fixed; top: 15px; left: 15px; z-index: 9999; background: white; padding: 15px; border: 2px solid #222; border-radius: 10px; font-family: sans-serif; width: 250px; box-shadow: 3px 3px 10px rgba(0,0,0,0.3); transition: 0.3s; }
        #painel.minimizado { transform: translateX(-260px); }
        #btn-toggle { position: absolute; right: -45px; top: 0; background: #2e7d32; color: white; border: 2px solid #222; border-left: none; padding: 10px; cursor: pointer; border-radius: 0 5px 5px 0; font-weight: bold; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; }
        .rotulo-hd { color: black !important; font-weight: 900 !important; font-size: 16px !important; text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff; white-space: nowrap; pointer-events: none; background: none !important; border: none !important; }
        .item-leg { display: flex; align-items: center; margin-bottom: 2px; }
        .cor-leg { width: 14px; height: 14px; margin-right: 5px; border: 1px solid #000; }
        .user-loc-icon { width: 12px; height: 12px; background: #007bff; border: 2px solid white; border-radius: 50%; box-shadow: 0 0 10px #007bff; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"></script>

                initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

                #map_4d155f81c9bb4652802ab54a66c92d29 {
                    position: relative;
                    width: 100.0%;
                    height: 100.0%;
                    left: 0.0%;
                    top: 0.0%;

                height: 100%;

                padding: 0;

                position:absolute;

                bottom:0;

</head>
<body>
    
    
    <div id="painel">
        <div id="btn-toggle" onclick="toggleMenu()">☰</div>
        <b style="font-size: 15px;">🚜 GESTÃO CLEALCO</b><hr>
        <input list="lista_fazendas" id="input_fazenda" oninput="atualizarMapa()" placeholder="🔍 Buscar Fazenda..." style="width: 90%; padding: 8px; border-radius: 5px; border: 1px solid #ccc;">
        <datalist id="lista_fazendas"><option value="100453"><option value="107383"><option value="202948"></datalist>
        
        <button onclick="minhaPosicao()" style="width:100%; margin-top:10px; padding:10px; background:#2e7d32; color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">
            <i class="fas fa-location-arrow"></i> MINHA LOCALIZAÇÃO
        </button>

        <div style="font-size: 12px; margin-top: 15px;">
            <b>🎨 TEMAS:</b><br>
            <label><input type="radio" name="tema" onclick="mudarTema(1)" checked> Classif. Tiro Médio</label><br>
            <label><input type="radio" name="tema" onclick="mudarTema(2)"> Classif. Talhão</label>
        </div>
        
        <div id="legenda-container" style="margin-top:10px; font-size:11px;">
            <div class="item-leg"><div class="cor-leg" style="background:#ff0000"></div> 0 - 150 (Curto)</div>
            <div class="item-leg"><div class="cor-leg" style="background:#ffff00"></div> 151 - 300 (Médio)</div>
            <div class="item-leg"><div class="cor-leg" style="background:#00ff00"></div> 301 - 450 (Longo)</div>
            <div class="item-leg"><div class="cor-leg" style="background:#00fffa"></div> > 450 (Extra)</div>
        </div>

        <hr>
        <div style="font-size: 12px;">
            <label><input type="checkbox" id="chk_divisas" checked onclick="toggleDivisas()"> Ver Divisas</label><br>
            <label><input type="checkbox" id="chk_satelite" checked onclick="toggleSatelite()"> Satélite</label>
        </div>
        <button onclick="location.reload()" style="width: 100%; margin-top: 10px; padding: 8px; cursor: pointer; background: #f0f0f0; border: 1px solid #999; border-radius: 5px;">🔄 Sync / Reset</button>
    </div>
    
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').then(() => console.log("SW OK"));
    }

    var mapObj, userMarker, tilesCarregados = new Set(), filtroFazenda = "", temaAtivo = 1, camadaDivisas = null, camadasLinhas = [], marcadoresLabels = [];

    function toggleMenu() { document.getElementById('painel').classList.toggle('minimizado'); }

    $(document).ready(function() {
        setTimeout(function() {
            mapObj = window[document.querySelector('.folium-map').id];
            mapObj.createPane('pane_divisas').style.zIndex = 650;
            mapObj.createPane('pane_gps').style.zIndex = 1000;
            
            $.getJSON("labels.json", function(data) {
                data.forEach(function(l) {
                    var m = L.marker([l.lat, l.lng], { 
                        icon: L.divIcon({ className: 'rotulo-hd', html: l.talhao }), 
                        alt: l.fazenda.toString().trim().toUpperCase() 
                    });
                    marcadoresLabels.push(m);
                });
            });

            $.getJSON("manifesto.json", function(data) {
                mapObj.on('moveend', function() { scanTiles(data); });
                scanTiles(data);
            });
        }, 800);
    });

    function minhaPosicao() {
        mapObj.locate({setView: true, maxZoom: 18, enableHighAccuracy: true});
        mapObj.on('locationfound', function(e) {
            if (userMarker) mapObj.removeLayer(userMarker);
            userMarker = L.marker(e.latlng, { icon: L.divIcon({ className: 'user-loc-icon' }), pane: 'pane_gps' }).addTo(mapObj);
        });
    }

    function atualizarMapa() { 
        var inputVal = document.getElementById('input_fazenda').value.trim().toUpperCase();
        if (!inputVal || inputVal === filtroFazenda) return;
        filtroFazenda = inputVal;

        if (camadaDivisas) { mapObj.removeLayer(camadaDivisas); }
        var nomeArquivo = "divisas_" + filtroFazenda.replace(/ /g, "_") + ".json";
        $.getJSON("divisas_split/" + nomeArquivo, function(data) {
            camadaDivisas = L.geoJson(data, {
                pane: 'pane_divisas',
                style: { color: "black", weight: 2, fillOpacity: 0.1 },
                onEachFeature: (f, l) => l.bindPopup("<b>TALHÃO:</b> " + f.properties.TALHAO)
            }).addTo(mapObj);
        });

        refreshVisual(); 
        var pts = marcadoresLabels.filter(m => m.options.alt === filtroFazenda).map(m => m.getLatLng());
        if (pts.length > 0) mapObj.fitBounds(L.latLngBounds(pts), { padding: [50, 50] });
    }

    function refreshVisual() {
        var show = (filtroFazenda !== "");
        camadasLinhas.forEach(function(c) {
            c.eachLayer(function(l) {
                var p = l.feature.properties;
                var match = show && p.FAZENDA.toString().trim().toUpperCase() === filtroFazenda;
                l.setStyle({ 
                    opacity: match ? 0.8 : 0, 
                    weight: match ? 1 : 0, 
                    color: (temaAtivo == 1 ? getCorTiro(p.CLASSE) : p.color_talhao),
                    interactive: match
                });
            });
        });
        // Rótulos CONDICIONAIS: Só aparecem se temaAtivo for 2 (Talhões)
        marcadoresLabels.forEach(function(m) {
            if (show && temaAtivo == 2 && m.options.alt === filtroFazenda) m.addTo(mapObj); 
            else mapObj.removeLayer(m);
        });
    }

    function getCorTiro(v) { return v <= 150 ? '#ff0000' : v <= 300 ? '#ffff00' : v <= 450 ? '#00ff00' : '#00fffa'; }
    
    function scanTiles(manifesto) { 
        if (!filtroFazenda) return;
        var vB = mapObj.getBounds();
        manifesto.forEach(function(t) {
            if (vB.intersects(L.latLngBounds(t.bounds)) && !tilesCarregados.has(t.arquivo)) {
                tilesCarregados.add(t.arquivo);
                $.getJSON("tiles/" + t.arquivo, function(geo) {
                    var layer = L.geoJson(geo, { 
                        onEachFeature: (f, l) => l.bindPopup("<b>Comp:</b> " + f.properties.COMP_M.toFixed(1) + "m") 
                    }).addTo(mapObj);
                    camadasLinhas.push(layer);
                    refreshVisual();
                });
            }
        });
    }

    function mudarTema(t) { 
        temaAtivo = t; 
        document.getElementById('legenda-container').style.display = (t == 1) ? 'block' : 'none';
        refreshVisual(); 
    }

    function toggleDivisas() { if (camadaDivisas) { if (document.getElementById('chk_divisas').checked) mapObj.addLayer(camadaDivisas); else mapObj.removeLayer(camadaDivisas); } }
    function toggleSatelite() { mapObj.eachLayer(l => { if (l._url && l._url.includes('google')) { if (document.getElementById('chk_satelite').checked) mapObj.addLayer(l); else mapObj.removeLayer(l); } }); }
    </script>

</body>

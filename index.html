    <style>
        #painel { 
            position: fixed; top: 10px; left: 10px; z-index: 9999; 
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            padding: 18px; border-radius: 20px; font-family: sans-serif; 
            width: 270px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.4);
            transition: 0.3s;
        }
        #painel.minimizado { transform: translateX(-285px); }
        #btn-toggle { position: absolute; right: -50px; top: 10px; background: #1b5e20; color: white; border: none; width: 45px; height: 45px; cursor: pointer; border-radius: 12px; }
        .btn-tech { width: 100%; padding: 12px; margin-top: 8px; border: none; border-radius: 10px; background: #1b5e20; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .user-loc { 
            width: 15px !important; height: 15px !important; 
            background: #007bff; border: 3px solid white; border-radius: 50%; 
            box-shadow: 0 0 15px #007bff; animation: pulse-gps 1.5s infinite; 
        }
        @keyframes pulse-gps { 0% { box-shadow: 0 0 0 0 rgba(0,123,255,0.7); } 70% { box-shadow: 0 0 0 15px rgba(0,123,255,0); } 100% { box-shadow: 0 0 0 0 rgba(0,123,255,0); } }
        
        .rotulo-hd { color: black !important; font-weight: 900 !important; font-size: 16px !important; text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff; pointer-events: none; }
    </style>

<body>
    
    
    <div id="painel">
        <button id="btn-toggle" onclick="toggleMenu()">☰</button>
        <div style="text-align:center; margin-bottom:12px;">
            <b style="color:#1b5e20; font-size:16px;">GESTOR CLEALCO</b><br>
            <span style="font-size:10px; color:#666;">Versão v21</span>
        </div>
        <input list="lista_fazendas" id="input_fazenda" oninput="atualizarMapa()" placeholder="🔍 Localizar Fazenda...">
        <datalist id="lista_fazendas"><option value="100453"><option value="107383"><option value="202948"></datalist>
        <button class="btn-tech" onclick="irParaRota()"><i class="fas fa-route"></i> ROTA GOOGLE</button>
        <button class="btn-tech" style="background:#444" onclick="minhaPosicao()"><i class="fas fa-crosshairs"></i> ONDE ESTOU?</button>
        <div style="font-size: 11px; margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
            <label><input type="checkbox" id="chk_divisas" checked onclick="toggleDivisas()"> Divisas</label>
            <label><input type="checkbox" id="chk_satelite" checked onclick="toggleSatelite()"> Satélite</label>
            <label><input type="radio" name="tema" onclick="mudarTema(1)" checked> Tiros</label>
            <label><input type="radio" name="tema" onclick="mudarTema(2)"> Talhões</label>
        </div>
        <button class="btn-tech" style="background:#ddd; color:#333; height:30px; font-size:10px;" onclick="location.reload(true)">ATUALIZAR</button>
    </div>
    
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
    
    var mapObj, userMarker, farmCenter = null, tilesCarregados = new Set(), filtroFazenda = "", temaAtivo = 1, camadaDivisas = null, camadasLinhas = [], marcadoresLabels = [];

    function toggleMenu() { document.getElementById('painel').classList.toggle('minimizado'); }

    $(document).ready(function() {
        setTimeout(function() {
            mapObj = window[document.querySelector('.folium-map').id];
            mapObj.createPane('pane_gps').style.zIndex = 1000;
            mapObj.createPane('pane_divisas').style.zIndex = 650;
            
            $.getJSON("labels.json", data => data.forEach(l => {
                marcadoresLabels.push(L.marker([l.lat, l.lng], { 
                    icon: L.divIcon({ className: 'rotulo-hd', html: l.talhao }), 
                    alt: l.fazenda.toString().toUpperCase() 
                }));
            }));
            $.getJSON("manifesto.json", data => {
                mapObj.on('moveend', () => scanTiles(data));
                scanTiles(data);
            });
        }, 800);
    });

    function atualizarMapa() {
        var val = document.getElementById('input_fazenda').value.trim().toUpperCase();
        if (!val || val === filtroFazenda) return;
        filtroFazenda = val;
        if (camadaDivisas) mapObj.removeLayer(camadaDivisas);
        $.getJSON("divisas_split/divisas_" + filtroFazenda.replace(/ /g, "_") + ".json", data => {
            camadaDivisas = L.geoJson(data, { pane: 'pane_divisas', style: { color: "white", weight: 2, fillOpacity: 0.1 }, onEachFeature: (f,l) => {
                let h = "<b>INFO</b><hr>";
                for(let k in f.properties) h += "<b>"+k+":</b> "+f.properties[k]+"<br>";
                l.bindPopup(h);
            }}).addTo(mapObj);
            farmCenter = camadaDivisas.getBounds().getCenter();
            mapObj.fitBounds(camadaDivisas.getBounds());
        });
        refreshVisual();
    }

    function refreshVisual() {
        let s = (filtroFazenda !== "");
        camadasLinhas.forEach(c => c.eachLayer(l => {
            let p = l.feature.properties;
            let m = s && p['FAZENDA'].toString().trim().toUpperCase() === filtroFazenda;
            l.setStyle({ opacity: m ? 0.8 : 0, weight: m ? 1 : 0, color: (temaAtivo == 1 ? getCorTiro(p['CLASSE']) : p.color_talhao), interactive: m });
        }));
        
        // AJUSTE: Rótulo só aparece se for Tema 2 (Talhões)
        marcadoresLabels.forEach(m => { 
            if(s && temaAtivo == 2 && m.options.alt === filtroFazenda) {
                m.addTo(mapObj); 
            } else {
                mapObj.removeLayer(m); 
            }
        });
    }

    function getCorTiro(v) { return v <= 150 ? '#ff0000' : v <= 300 ? '#ffff00' : v <= 450 ? '#00ff00' : '#00fffa'; }

    function scanTiles(manifesto) {
        if (!filtroFazenda) return;
        let vB = mapObj.getBounds();
        manifesto.forEach(t => {
            if (vB.intersects(L.latLngBounds(t.bounds)) && !tilesCarregados.has(t.arquivo)) {
                tilesCarregados.add(t.arquivo);
                $.getJSON("tiles/" + t.arquivo, geo => {
                    camadasLinhas.push(L.geoJson(geo, { 
                        onEachFeature: (f,l) => l.bindPopup("Comp: "+f.properties.COMP_M.toFixed(1)+"m") 
                    }).addTo(mapObj));
                    refreshVisual();
                });
            }
        });
    }

    function minhaPosicao() {
        mapObj.locate({setView: true, maxZoom: 18, enableHighAccuracy: true});
        mapObj.on('locationfound', e => {
            if (userMarker) mapObj.removeLayer(userMarker);
            userMarker = L.marker(e.latlng, { 
                icon: L.divIcon({ className: 'user-loc', iconSize: [15, 15] }),
                pane: 'pane_gps' 
            }).addTo(mapObj);
        });
    }

    function irParaRota() {
        if (!farmCenter) return alert("Selecione uma fazenda!");
        window.open("https://www.google.com/maps/dir/?api=1&destination=" + farmCenter.lat + "," + farmCenter.lng);
    }

    function mudarTema(t) { temaAtivo = t; refreshVisual(); }
    function toggleDivisas() { if(camadaDivisas) { if(document.getElementById('chk_divisas').checked) mapObj.addLayer(camadaDivisas); else mapObj.removeLayer(camadaDivisas); } }
    function toggleSatelite() { mapObj.eachLayer(l => { if(l._url && l._url.includes('google')) { if(document.getElementById('chk_satelite').checked) mapObj.addLayer(l); else mapObj.removeLayer(l); } }); }
    
    </script>
    
    
            <div class="folium-map" id="map_bd68a11dc4bf753bb333ca5915942621" ></div>
        
</body>

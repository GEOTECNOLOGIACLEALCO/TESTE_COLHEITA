    <script>
    
    let deferredPrompt;
    // SISTEMA DE ATUALIZAÇÃO E DOWNLOAD
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').then(reg => {
            reg.onupdatefound = () => {
                const newWorker = reg.installing;
                newWorker.onstatechange = () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                        if (confirm("Versão nova detectada! Quer atualizar agora?")) window.location.reload();
                    }
                };
            };
        });
    }

    // CAPTURA O EVENTO DE "DOWNLOAD"
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('btn-download').style.display = 'flex';
    });

    async function installPWA() {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') document.getElementById('btn-download').style.display = 'none';
        deferredPrompt = null;
    }

    var mapObj, userMarker, farmCenter = null, tilesCarregados = new Set(), filtroFazenda = "", temaAtivo = 1, camadaDivisas = null, camadasLinhas = [], marcadoresLabels = [];

    function toggleMenu() { 
        document.getElementById('painel').classList.toggle('minimizado');
        const icon = document.querySelector('#btn-toggle i');
        icon.classList.toggle('fa-bars');
        icon.classList.toggle('fa-chevron-right');
    }

    $(document).ready(function() {
        setTimeout(function() {
            mapObj = window[document.querySelector('.folium-map').id];
            mapObj.createPane('pane_gps').style.zIndex = 1000;
            mapObj.createPane('pane_divisas').style.zIndex = 600;
            mapObj.createPane('pane_labels').style.zIndex = 800;
            
            $.getJSON("labels.json", data => data.forEach(l => {
                marcadoresLabels.push(L.marker([l.lat, l.lng], { 
                    icon: L.divIcon({ className: 'rotulo-hd', html: l.talhao }), 
                    alt: l.fazenda.toString().toUpperCase(),
                    pane: 'pane_labels'
                }));
            }));
            $.getJSON("manifesto.json", data => {
                mapObj.on('moveend', () => scanTiles(data));
                scanTiles(data);
            });
        }, 800);
    });

    function atualizarMapa() {
        var val = document.getElementById('input_fazenda').value.trim().toUpperCase();
        if (!val || val === filtroFazenda) return;
        filtroFazenda = val;
        if (camadaDivisas) mapObj.removeLayer(camadaDivisas);
        $.getJSON("divisas_split/divisas_" + filtroFazenda.replace(/ /g, "_") + ".json", data => {
            camadaDivisas = L.geoJson(data, { 
                pane: 'pane_divisas', style: { color: "black", weight: 3, fillOpacity: 0.1 },
                onEachFeature: (f,l) => {
                    let h = "<b>DADOS DO SHAPEFILE</b><hr><table class='popup-table'>";
                    for (var key in f.properties) { h += "<tr><td><b>" + key + ":</b></td><td>" + f.properties[key] + "</td></tr>"; }
                    h += "</table>";
                    l.bindPopup(h);
                }
            }).addTo(mapObj);
            farmCenter = camadaDivisas.getBounds().getCenter();
            mapObj.fitBounds(camadaDivisas.getBounds());
        });
        refreshVisual();
    }

    function refreshVisual() {
        let s = (filtroFazenda !== "");
        camadasLinhas.forEach(c => c.eachLayer(l => {
            let p = l.feature.properties;
            let m = s && p['FAZENDA'].toString().trim().toUpperCase() === filtroFazenda;
            l.setStyle({ opacity: m ? 0.8 : 0, weight: m ? 1 : 0, color: (temaAtivo == 1 ? getCorTiro(p['CLASSE']) : p.color_talhao), interactive: m });
        }));
        // AJUSTE: Rótulo SÓ no Tema 2
        marcadoresLabels.forEach(m => { 
            if(s && temaAtivo == 2 && m.options.alt === filtroFazenda) m.addTo(mapObj); 
            else mapObj.removeLayer(m); 
        });
        document.getElementById('legenda-tiros').style.display = (temaAtivo == 1) ? 'block' : 'none';
    }

    function getCorTiro(v) { return v <= 150 ? '#ff0000' : v <= 300 ? '#ffff00' : v <= 450 ? '#00ff00' : '#00fffa'; }

    function scanTiles(manifesto) {
        if (!filtroFazenda) return;
        let vB = mapObj.getBounds();
        manifesto.forEach(t => {
            if (vB.intersects(L.latLngBounds(t.bounds)) && !tilesCarregados.has(t.arquivo)) {
                tilesCarregados.add(t.arquivo);
                $.getJSON("tiles/" + t.arquivo, geo => {
                    camadasLinhas.push(L.geoJson(geo, { onEachFeature: (f,l) => l.bindPopup("Comp: "+f.properties.COMP_M.toFixed(1)+"m") }).addTo(mapObj));
                    refreshVisual();
                });
            }
        });
    }

    function minhaPosicao() {
        mapObj.locate({setView: true, maxZoom: 18, enableHighAccuracy: true});
        mapObj.on('locationfound', e => {
            if (userMarker) mapObj.removeLayer(userMarker);
            var iconHtml = '<div class="user-loc-container"><div class="user-loc-pulse"></div><div class="user-loc-dot"></div></div>';
            userMarker = L.marker(e.latlng, { icon: L.divIcon({ className: '', html: iconHtml, iconSize: [40, 40] }), pane: 'pane_gps' }).addTo(mapObj);
        });
    }

    function irParaRota() {
        if (!farmCenter) return alert("Filtre uma fazenda!");
        window.open("https://www.google.com/maps/dir/?api=1&destination=" + farmCenter.lat + "," + farmCenter.lng);
    }
